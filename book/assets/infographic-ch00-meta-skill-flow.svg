<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
    <marker id="arwPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
    <linearGradient id="metaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5f5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="agGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5ba4cf;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6a5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0a040;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="orGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5f5c8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">메타 스킬이 하네스를 만드는 과정</text>
  <line x1="230" y1="54" x2="570" y2="54" stroke="#bdc3c7" stroke-width="2"/>

  <!-- Step 1: User Request -->
  <rect x="60" y="85" width="200" height="70" rx="12" fill="#ecf0f1" filter="url(#sh)" stroke="#bdc3c7" stroke-width="1"/>
  <text x="160" y="112" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">사용자 요청</text>
  <text x="160" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7f8c8d">"하네스 구성해줘"</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="120" x2="310" y2="120" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Step 2: Meta Skill -->
  <rect x="320" y="75" width="200" height="90" rx="14" fill="url(#metaGrad)" filter="url(#sh)"/>
  <text x="420" y="107" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">하네스 메타 스킬</text>
  <text x="420" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">/harness</text>
  <text x="420" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">스킬을 만드는 스킬</text>

  <!-- Arrow 2: fan-out -->
  <line x1="420" y1="165" x2="420" y2="195" stroke="#8e44ad" stroke-width="2" marker-end="url(#arwPurple)"/>

  <!-- Phase labels -->
  <text x="400" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#8e44ad">자동 생성</text>

  <!-- Three output boxes -->
  <!-- Agents -->
  <rect x="60" y="250" width="200" height="120" rx="12" fill="url(#agGrad)" filter="url(#sh)"/>
  <text x="160" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">에이전트 팀</text>
  <text x="160" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2c3e50">.claude/agents/*.md</text>
  <text x="160" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2c3e50">전문가 A, B, C, ...</text>
  <text x="160" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">"누가 하는가"</text>

  <!-- Skills -->
  <rect x="300" y="250" width="200" height="120" rx="12" fill="url(#skGrad)" filter="url(#sh)"/>
  <text x="400" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">스킬 정의</text>
  <text x="400" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2c3e50">.claude/skills/*/SKILL.md</text>
  <text x="400" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2c3e50">작업 절차, 도구, 규칙</text>
  <text x="400" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">"어떻게 하는가"</text>

  <!-- Orchestrator -->
  <rect x="540" y="250" width="200" height="120" rx="12" fill="url(#orGrad)" filter="url(#sh)"/>
  <text x="640" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">오케스트레이터</text>
  <text x="640" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2c3e50">.claude/skills/{팀}/SKILL.md</text>
  <text x="640" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2c3e50">Phase별 워크플로우</text>
  <text x="640" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">"어떤 순서로 하는가"</text>

  <!-- Fan-out arrows from meta skill -->
  <line x1="370" y1="210" x2="160" y2="248" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="215" x2="400" y2="248" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="470" y1="210" x2="640" y2="248" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Result arrow -->
  <rect x="200" y="410" width="400" height="55" rx="12" fill="#2c3e50" filter="url(#sh)"/>
  <text x="400" y="435" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">완성된 하네스</text>
  <text x="400" y="453" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">에이전트 팀이 오케스트레이터의 지휘 아래 협업</text>

  <!-- Arrows to result -->
  <line x1="160" y1="370" x2="300" y2="410" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arw)"/>
  <line x1="400" y1="370" x2="400" y2="408" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arw)"/>
  <line x1="640" y1="370" x2="500" y2="410" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arw)"/>
</svg>
