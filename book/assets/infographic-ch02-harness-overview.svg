<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
    <marker id="arrMeta" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">하네스 구성 요소 전체 맵</text>
  <line x1="270" y1="60" x2="530" y2="60" stroke="#bdc3c7" stroke-width="2"/>

  <!-- Harness outer box -->
  <rect x="100" y="85" width="600" height="310" rx="16" fill="none" stroke="#2c3e50" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="120" y="108" font-family="sans-serif" font-size="13" fill="#7f8c8d" font-weight="bold">HARNESS</text>

  <!-- Element 1: Agent Team -->
  <rect x="130" y="125" width="170" height="150" rx="14" fill="#a8d8ea" filter="url(#shadow2)"/>
  <text x="215" y="155" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">에이전트 팀</text>

  <!-- Agent icons -->
  <circle cx="170" cy="200" r="16" fill="#5ba4cf"/>
  <text x="170" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">A1</text>
  <circle cx="215" cy="200" r="16" fill="#5ba4cf"/>
  <text x="215" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">A2</text>
  <circle cx="260" cy="200" r="16" fill="#5ba4cf"/>
  <text x="260" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">A3</text>

  <text x="215" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34495e">역할 분담된</text>
  <text x="215" y="264" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34495e">전문가 에이전트들</text>

  <!-- Element 2: Orchestrator Skill -->
  <rect x="320" y="125" width="170" height="150" rx="14" fill="#ffd6a5" filter="url(#shadow2)"/>
  <text x="405" y="150" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">오케스트레이터</text>
  <text x="405" y="170" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">스킬</text>

  <!-- Orchestrator flow icon -->
  <rect x="365" y="188" width="80" height="14" rx="7" fill="#e8943a" opacity="0.6"/>
  <rect x="365" y="208" width="80" height="14" rx="7" fill="#e8943a" opacity="0.7"/>
  <rect x="365" y="228" width="80" height="14" rx="7" fill="#e8943a" opacity="0.8"/>
  <text x="405" y="199" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Phase 1</text>
  <text x="405" y="219" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Phase 2</text>
  <text x="405" y="239" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Phase 3</text>

  <text x="405" y="264" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34495e">실행 흐름 제어</text>

  <!-- Element 3: Directory Structure -->
  <rect x="510" y="125" width="170" height="150" rx="14" fill="#c3e6cb" filter="url(#shadow2)"/>
  <text x="595" y="150" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">디렉토리</text>
  <text x="595" y="170" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">구조</text>

  <!-- Directory tree icon -->
  <text x="560" y="200" font-family="monospace" font-size="11" fill="#2d6a4f">.claude/</text>
  <text x="575" y="216" font-family="monospace" font-size="11" fill="#2d6a4f">agents/</text>
  <text x="575" y="232" font-family="monospace" font-size="11" fill="#2d6a4f">skills/</text>
  <text x="560" y="248" font-family="monospace" font-size="11" fill="#2d6a4f">output/</text>
  <text x="560" y="264" font-family="monospace" font-size="11" fill="#2d6a4f">SKILL.md</text>

  <!-- Connecting arrows between elements -->
  <line x1="300" y1="200" x2="318" y2="200" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="200" x2="508" y2="200" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Meta Skill: Generator -->
  <rect x="230" y="440" width="340" height="80" rx="20" fill="#d4b5e5" filter="url(#shadow2)"/>
  <text x="400" y="475" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#6c3483">메타 스킬</text>
  <text x="400" y="500" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6c3483">하네스 3요소를 자동 생성</text>

  <!-- Arrows from meta skill to each element -->
  <path d="M310,440 Q215,395 215,280" fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrMeta)"/>
  <path d="M400,440 L400,280" fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrMeta)"/>
  <path d="M490,440 Q595,395 595,280" fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrMeta)"/>

  <!-- Labels on arrows -->
  <text x="215" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8e44ad">생성</text>
  <text x="415" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8e44ad">생성</text>
  <text x="595" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8e44ad">생성</text>

  <!-- Bottom note -->
  <text x="400" y="565" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#95a5a6">메타 스킬 하나로 전체 하네스를 자동 구축</text>
</svg>