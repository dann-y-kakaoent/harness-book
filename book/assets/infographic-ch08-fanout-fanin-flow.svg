<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="sh8" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="a8" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="a8b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980b9"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa" rx="12"/>

  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">팬아웃 / 팬인 데이터 흐름</text>
  <text x="400" y="66" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#95a5a6">리서치 팀 병렬 조사 워크플로우</text>

  <!-- Input -->
  <rect x="40" y="250" width="110" height="60" rx="14" fill="#2c3e50" filter="url(#sh8)"/>
  <text x="95" y="276" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">조사 요청</text>
  <text x="95" y="296" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#bdc3c7">주제 목록</text>

  <!-- Fan-out: Distributor -->
  <line x1="152" y1="280" x2="192" y2="280" stroke="#555" stroke-width="2" marker-end="url(#a8)"/>

  <rect x="195" y="240" width="100" height="80" rx="14" fill="#f0c040" filter="url(#sh8)"/>
  <text x="245" y="272" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#7d6608">분배기</text>
  <text x="245" y="292" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7d6608">Fan-out</text>

  <!-- Fan-out arrows -->
  <line x1="297" y1="255" x2="365" y2="135" stroke="#d4a017" stroke-width="2" marker-end="url(#a8)"/>
  <line x1="297" y1="270" x2="365" y2="235" stroke="#d4a017" stroke-width="2" marker-end="url(#a8)"/>
  <line x1="297" y1="285" x2="365" y2="335" stroke="#d4a017" stroke-width="2" marker-end="url(#a8)"/>
  <line x1="297" y1="300" x2="365" y2="435" stroke="#d4a017" stroke-width="2" marker-end="url(#a8)"/>

  <!-- Parallel research agents -->
  <rect x="368" y="105" width="140" height="60" rx="12" fill="#a8d8ea" filter="url(#sh8)"/>
  <circle cx="395" cy="130" r="12" fill="#5ba4cf"/>
  <text x="395" y="134" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">R1</text>
  <text x="450" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">API 조사</text>
  <text x="450" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">기술 문서 분석</text>

  <rect x="368" y="205" width="140" height="60" rx="12" fill="#c3e6cb" filter="url(#sh8)"/>
  <circle cx="395" cy="230" r="12" fill="#27ae60"/>
  <text x="395" y="234" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">R2</text>
  <text x="450" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">사례 조사</text>
  <text x="450" y="250" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">실전 사례 수집</text>

  <rect x="368" y="305" width="140" height="60" rx="12" fill="#ffd6a5" filter="url(#sh8)"/>
  <circle cx="395" cy="330" r="12" fill="#e8943a"/>
  <text x="395" y="334" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">R3</text>
  <text x="450" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">경쟁 분석</text>
  <text x="450" y="350" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">대안 비교</text>

  <rect x="368" y="405" width="140" height="60" rx="12" fill="#d5a6e6" filter="url(#sh8)"/>
  <circle cx="395" cy="430" r="12" fill="#8e44ad"/>
  <text x="395" y="434" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">R4</text>
  <text x="450" y="430" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">트렌드 분석</text>
  <text x="450" y="450" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">최신 동향 파악</text>

  <!-- Parallel indicator -->
  <rect x="525" y="130" width="18" height="310" rx="4" fill="none" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="534" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#bdc3c7" transform="rotate(-90 534 290)">병렬 실행</text>

  <!-- Fan-in arrows -->
  <line x1="510" y1="135" x2="565" y2="255" stroke="#2980b9" stroke-width="2" marker-end="url(#a8b)"/>
  <line x1="510" y1="235" x2="565" y2="265" stroke="#2980b9" stroke-width="2" marker-end="url(#a8b)"/>
  <line x1="510" y1="335" x2="565" y2="290" stroke="#2980b9" stroke-width="2" marker-end="url(#a8b)"/>
  <line x1="510" y1="435" x2="565" y2="305" stroke="#2980b9" stroke-width="2" marker-end="url(#a8b)"/>

  <!-- Fan-in: Integrator -->
  <rect x="568" y="240" width="100" height="80" rx="14" fill="#2980b9" filter="url(#sh8)"/>
  <text x="618" y="272" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">통합기</text>
  <text x="618" y="292" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d5eef9">Fan-in</text>

  <!-- Output -->
  <line x1="670" y1="280" x2="702" y2="280" stroke="#555" stroke-width="2" marker-end="url(#a8)"/>

  <rect x="705" y="245" width="75" height="70" rx="14" fill="#2c3e50" filter="url(#sh8)"/>
  <text x="743" y="276" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">통합</text>
  <text x="743" y="296" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">보고서</text>

  <!-- Bottom: Flow summary -->
  <rect x="120" y="520" width="560" height="55" rx="12" fill="white" filter="url(#sh8)" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="145" y="535" width="80" height="26" rx="13" fill="#f0c040"/>
  <text x="185" y="553" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">분배</text>
  <text x="240" y="553" font-family="sans-serif" font-size="16" fill="#bdc3c7">-></text>
  <rect x="265" y="535" width="100" height="26" rx="13" fill="#a8d8ea"/>
  <text x="315" y="553" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2c3e50" font-weight="bold">병렬 조사</text>
  <text x="380" y="553" font-family="sans-serif" font-size="16" fill="#bdc3c7">-></text>
  <rect x="405" y="535" width="80" height="26" rx="13" fill="#2980b9"/>
  <text x="445" y="553" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">통합</text>
  <text x="500" y="553" font-family="sans-serif" font-size="16" fill="#bdc3c7">-></text>
  <rect x="525" y="535" width="80" height="26" rx="13" fill="#2c3e50"/>
  <text x="565" y="553" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">보고서</text>
</svg>