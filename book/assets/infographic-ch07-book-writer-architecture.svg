<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="sh7" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="a7" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="a7w" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="white"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa" rx="12"/>

  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">book-writer 하네스 아키텍처</text>

  <!-- Agent team row -->
  <text x="400" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7f8c8d">5명의 전문가 에이전트</text>

  <!-- Agents -->
  <rect x="30" y="85" width="130" height="65" rx="10" fill="#a8d8ea" filter="url(#sh7)"/>
  <circle cx="60" cy="105" r="12" fill="#5ba4cf"/>
  <text x="60" y="109" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">1</text>
  <text x="105" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">기획자</text>
  <text x="95" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">목차/구조 설계</text>

  <rect x="175" y="85" width="130" height="65" rx="10" fill="#ffd6a5" filter="url(#sh7)"/>
  <circle cx="205" cy="105" r="12" fill="#e8943a"/>
  <text x="205" y="109" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">2</text>
  <text x="250" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">리서처</text>
  <text x="240" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">자료 조사/분석</text>

  <rect x="320" y="85" width="130" height="65" rx="10" fill="#c3e6cb" filter="url(#sh7)"/>
  <circle cx="350" cy="105" r="12" fill="#27ae60"/>
  <text x="350" y="109" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">3</text>
  <text x="395" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">작가</text>
  <text x="385" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">원고 집필</text>

  <rect x="465" y="85" width="130" height="65" rx="10" fill="#f5cba7" filter="url(#sh7)"/>
  <circle cx="495" cy="105" r="12" fill="#e67e22"/>
  <text x="495" y="109" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">4</text>
  <text x="540" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">편집자</text>
  <text x="530" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">교정/교열</text>

  <rect x="610" y="85" width="130" height="65" rx="10" fill="#d5a6e6" filter="url(#sh7)"/>
  <circle cx="640" cy="105" r="12" fill="#8e44ad"/>
  <text x="640" y="109" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">5</text>
  <text x="685" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">검수자</text>
  <text x="675" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">품질 검증</text>

  <!-- Phase flow area -->
  <rect x="40" y="175" width="720" height="400" rx="14" fill="white" filter="url(#sh7)" stroke="#e0e0e0" stroke-width="1"/>
  <text x="70" y="200" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7f8c8d">워크플로우: 파이프라인 + 생성-검증</text>

  <!-- Phase 1 -->
  <rect x="70" y="215" width="660" height="60" rx="10" fill="#e8f4fd"/>
  <text x="90" y="240" font-family="sans-serif" font-size="13" font-weight="bold" fill="#2980b9">Phase 1: 기획</text>
  <text x="90" y="260" font-family="sans-serif" font-size="11" fill="#555">기획자가 목차와 챕터 구조 설계</text>
  <circle cx="690" cy="245" r="14" fill="#5ba4cf"/>
  <text x="690" y="249" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">기획</text>

  <!-- Arrow -->
  <line x1="400" y1="275" x2="400" y2="290" stroke="#bdc3c7" stroke-width="2" marker-end="url(#a7)"/>

  <!-- Phase 2 -->
  <rect x="70" y="293" width="660" height="60" rx="10" fill="#fef9e7"/>
  <text x="90" y="318" font-family="sans-serif" font-size="13" font-weight="bold" fill="#d4a017">Phase 2: 리서치</text>
  <text x="90" y="338" font-family="sans-serif" font-size="11" fill="#555">리서처가 챕터별 자료 조사</text>
  <circle cx="690" cy="323" r="14" fill="#e8943a"/>
  <text x="690" y="327" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">리서</text>

  <line x1="400" y1="353" x2="400" y2="368" stroke="#bdc3c7" stroke-width="2" marker-end="url(#a7)"/>

  <!-- Phase 3: Generate-Verify loop -->
  <rect x="70" y="371" width="660" height="70" rx="10" fill="#eafaf1"/>
  <text x="90" y="396" font-family="sans-serif" font-size="13" font-weight="bold" fill="#27ae60">Phase 3: 집필</text>
  <text x="90" y="416" font-family="sans-serif" font-size="11" fill="#555">작가가 원고 집필</text>

  <!-- Generate-Verify indicator -->
  <rect x="480" y="384" width="100" height="22" rx="6" fill="#27ae60"/>
  <text x="530" y="399" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">생성</text>
  <rect x="590" y="384" width="55" height="22" rx="6" fill="#e74c3c"/>
  <text x="618" y="399" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">검증</text>
  <path d="M618,408 Q618,420 555,420 Q505,420 530,408" fill="none" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="690" cy="401" r="14" fill="#27ae60"/>
  <text x="690" y="405" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">작가</text>

  <line x1="400" y1="441" x2="400" y2="456" stroke="#bdc3c7" stroke-width="2" marker-end="url(#a7)"/>

  <!-- Phase 4 -->
  <rect x="70" y="459" width="660" height="50" rx="10" fill="#fdf2e9"/>
  <text x="90" y="482" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e67e22">Phase 4: 편집</text>
  <text x="90" y="498" font-family="sans-serif" font-size="11" fill="#555">편집자가 교정/교열</text>
  <rect x="480" y="472" width="100" height="22" rx="6" fill="#e67e22"/>
  <text x="530" y="487" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">생성</text>
  <rect x="590" y="472" width="55" height="22" rx="6" fill="#e74c3c"/>
  <text x="618" y="487" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">검증</text>
  <circle cx="690" cy="484" r="14" fill="#e67e22"/>
  <text x="690" y="488" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">편집</text>

  <line x1="400" y1="509" x2="400" y2="523" stroke="#bdc3c7" stroke-width="2" marker-end="url(#a7)"/>

  <!-- Phase 5 -->
  <rect x="70" y="526" width="660" height="40" rx="10" fill="#ebdef0"/>
  <text x="90" y="551" font-family="sans-serif" font-size="13" font-weight="bold" fill="#8e44ad">Phase 5: 최종 검수</text>
  <text x="310" y="551" font-family="sans-serif" font-size="11" fill="#555">검수자가 전체 품질 검증</text>
  <circle cx="690" cy="546" r="14" fill="#8e44ad"/>
  <text x="690" y="550" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">검수</text>
</svg>